version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - interview-net

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/interview
      PORT: 3000
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      AI_MODEL: ${AI_MODEL:-qwen-max}
    volumes:
      - uploads-data:/app/uploads
    expose:
      - "3000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - interview-net

  mongo:
    image: docker.m.daocloud.io/library/mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - interview-net

volumes:
  mongo-data:
  uploads-data:

networks:
  interview-net:
    driver: bridge
